<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flask Gordon</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
        background-color: #0b0c10;
        color: #45a29e;
        font-family: 'VT323', monospace;
        font-size: 22px; 
        margin: 0;
        padding: 0px 20px 20px 20px; 
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    #escenario-coche {
        width: 80%;
        height: 110px; 
        border-bottom: 2px dashed #66fcf1;
        position: relative;
        margin-bottom: 10px; 
        overflow: hidden;
        margin-top: 0px;
    }

    #coche-retro {
        font-size: 100px; 
        position: absolute;
        left: 50%;
        bottom: 0px; 
        transform: translateX(-50%);
        line-height: 1; 
    }

    @keyframes conduccion {
        0% { transform: translateX(60vw); }
        100% { transform: translateX(-60vw); }
    }

    .contenedor {
        width: 480px; 
        background: #1f2833;
        border: 3px solid #66fcf1;
        border-radius: 15px;
        box-shadow: 0 0 20px #66fcf155;
    }

    .salpicadero {
        padding: 5px;
        border-bottom: 2px solid #45a29e;
        text-align: center;
        transition: all 0.3s ease;
        position: relative;
        padding-bottom: 0px;
        padding-top: 0px;
    }

    .salpicadero-apagado {
        opacity: 0.3;
        filter: grayscale(80%);
    }

    .animacion-arranque {
        animation: arranqueMotor 0.1s infinite alternate;
    }

    @keyframes arranqueMotor {
        0% { opacity: 0.2; text-shadow: 0 0 10px white; color: white; }
        100% { opacity: 1; text-shadow: 0 0 30px #66fcf1; color: #66fcf1; }
    }

    .panel-central {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-top: 20px;
    }

    .velocimetro {
        font-family: 'VT323', monospace;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: conic-gradient(from 180deg, #66fcf1 0%, #111 0%); 
        box-shadow: 0 0 15px #66fcf155;
        color: #66fcf1;
        text-shadow: 0 0 10px #66fcf1;
        margin-bottom: 10px;
    }

    .velocimetro::after {
        content: "";
        position: absolute;
        top: 10px; left: 10px; right: 10px; bottom: 10px; 
        background-color: #0b0c10;
        border-radius: 50%;
        z-index: 1;
        box-shadow: inset 0 0 15px black;
    }

    #pantalla-velocidad, .unidad {
        position: relative;
        z-index: 2; 
    }

    #pantalla-velocidad {
        font-size: 60px; 
    }

    .unidad {
        font-size: 20px;
        margin-top: 5px;
        color: #c5c6c7;
        font-family: 'VT323', monospace;
    }

    .intermitente {
        font-size: 50px;
        opacity: 0.2; 
        color: inherit; 
    }

    .parpadeando {
        animation: parpadeo 0.5s infinite;
    }

    @keyframes parpadeo {
        0% { opacity: 1; color: white; text-shadow: 0 0 20px white, 0 0 10px white; }
        50% { opacity: 0.2; color: inherit; text-shadow: none; }
        100% { opacity: 1; color: white; text-shadow: 0 0 20px white, 0 0 10px white; }
    }

    #mensaje-peligro {
        display: none;
        color: #ff003c;
        background: rgba(255, 0, 0, 0.1);
        border: 2px solid #ff003c;
        padding: 10px;
        border-radius: 5px;
        margin-top: 5px;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 24px; 
        animation: parpadeoPeligro 0.3s infinite alternate;
    }

    @keyframes parpadeoPeligro {
        0% { opacity: 1; box-shadow: 0 0 10px rgba(255, 0, 0, 0.61); }
        100% { opacity: 0.4; box-shadow: none; }
    }

    .controles {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .fila-controles {
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    button {
        background-color: #0b0c10;
        color: #66fcf1;
        border: 2px solid #66fcf1;
        padding: 8px 15px; 
        font-family: 'VT323', monospace;
        font-size: 18px; 
        cursor: pointer;
        border-radius: 5px;
        transition: 0.2s;
    }

    button:hover {
        background-color: #66fcf1;
        color: #0b0c10;
    }

    input[type="number"] {
        font-family: 'VT323', monospace;
        font-size: 18px;
        background-color: #1f2833;
        color: #66fcf1;
        border: 1px solid #66fcf1;
        padding: 5px;
        width: 50px;
    }
</style>
</head>
<body>
    <div id="escenario-coche">
        <div id="coche-retro">🏎️</div>
    </div>

    <div class="contenedor">
        <div id="salpicadero-visual" class="salpicadero salpicadero-apagado">
            <h2>Estado: <span id="pantalla-estado">APAGADO</span></h2>
            
            <div class="panel-central">
                <div id="intermitente-izq" class="intermitente">⬅️</div>
                <div class="velocimetro">
                    <span id="pantalla-velocidad">0</span>
                    <span class="unidad">km/h</span>
                </div>
                <div id="intermitente-der" class="intermitente">➡️</div>
            </div>

            <div id="mensaje-peligro">¡Dele suave mi loco que te vas a matar! ⚠️</div>
        </div>

        <div class="controles">
            <div class="fila-controles">
                <label>Incremento velocidad: 
                    <input type="number" id="entrada-incremento" value="50" min="1">
                </label>
            </div>
            <div class="fila-controles">
                <button id="btn-arrancar">🔑 Arrancar</button>
                <button id="btn-apagar">⛔ Apagar</button>
            </div>
            <div class="fila-controles">
                <button id="btn-acelerar">⬆️ Acelerar</button>
                <button id="btn-frenar">⬇️ Frenar</button>
            </div>
            <div class="fila-controles">
                <button id="btn-girar-izq">⬅️ Girar Izquierda</button>
                <button id="btn-girar-der">➡️ Girar Derecha</button>
            </div>
            <div class="fila-controles">
                <button id="btn-pitar">🔊 Pitar</button>
            </div>
        </div>
    </div>

    <audio id="audio-arranque" src="{{ url_for('static', filename='arrancar.mp3') }}"></audio>
    <audio id="audio-claxon" src="{{ url_for('static', filename='claxon.mp3') }}"></audio>
    <audio id="audio-fondo" src="{{ url_for('static', filename='fondo.mp3') }}" loop></audio>

<script>
var timeoutMusicaFondo;

function arrancarCoche() {
    var salpicadero = document.getElementById('salpicadero-visual');
    var audioArranque = document.getElementById('audio-arranque');
    var audioFondo = document.getElementById('audio-fondo');
    
    audioArranque.currentTime = 0;
    audioArranque.play();

    clearTimeout(timeoutMusicaFondo);
    timeoutMusicaFondo = setTimeout(function() {
        audioFondo.volume = 0.2;
        audioFondo.play();
    }, 1500);

    salpicadero.classList.remove('salpicadero-apagado');
    salpicadero.classList.add('animacion-arranque');

    setTimeout(function() {
        fetch('/arrancar', { method: 'POST' })
        .then(function(respuesta) { return respuesta.json(); })
        .then(function(data) { 
            salpicadero.classList.remove('animacion-arranque');
            actualizarPantalla(data.estado); 
        });
    }, 1000);
}

function apagarCoche() {
    var audioFondo = document.getElementById('audio-fondo');
    var audioArranque = document.getElementById('audio-arranque');
    
    clearTimeout(timeoutMusicaFondo);
    
    audioFondo.pause();
    audioFondo.currentTime = 0;
    
    audioArranque.pause();
    audioArranque.currentTime = 0;

    fetch('/apagar', { method: 'POST' })
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(data) { actualizarPantalla(data.estado); });
}

function acelerarCoche() {
    var valorIncremento = document.getElementById('entrada-incremento').value;
    fetch('/acelerar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ incremento: valorIncremento }) 
    })
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(data) { actualizarPantalla(data.estado); });
}

function frenarCoche() {
    var valorIncremento = document.getElementById('entrada-incremento').value;
    fetch('/frenar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ incremento: valorIncremento }) 
    })
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(data) { actualizarPantalla(data.estado); });
}

function girarIzquierda() {
    fetch('/girar_izq', { method: 'POST' })
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(data) { actualizarPantalla(data.estado); });
}

function girarDerecha() {
    fetch('/girar_der', { method: 'POST' })
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(data) { actualizarPantalla(data.estado); });
}

function actualizarPantalla(estado) {
    var pantallaEstado = document.getElementById('pantalla-estado');
    var pantallaVelocidad = document.getElementById('pantalla-velocidad');
    var interIzq = document.getElementById('intermitente-izq');
    var interDer = document.getElementById('intermitente-der');
    var cocheRetro = document.getElementById('coche-retro');
    var salpicadero = document.getElementById('salpicadero-visual');
    var mensajePeligro = document.getElementById('mensaje-peligro');
    var velocimetroDiv = document.querySelector('.velocimetro');

    if (estado.encendido == true) {
        salpicadero.classList.remove('salpicadero-apagado');
        pantallaEstado.innerText = "ENCENDIDO";
        pantallaEstado.style.color = "#39ff14"; 
        pantallaEstado.style.textShadow = "0 0 15px #39ff14"; 
    } else {
        salpicadero.classList.add('salpicadero-apagado');
        pantallaEstado.innerText = "APAGADO";
        pantallaEstado.style.color = "red";
        pantallaEstado.style.textShadow = "none"; 
    }

    pantallaVelocidad.innerText = estado.velocidad;

    var porcentaje = (estado.velocidad / 250) * 100;

    if (estado.velocidad >= 200) {
        mensajePeligro.style.display = "block"; 
        pantallaVelocidad.style.color = "red";
        pantallaVelocidad.style.textShadow = "0 0 10px red";
        velocimetroDiv.style.boxShadow = "0 0 10px red";
        velocimetroDiv.style.background = "conic-gradient(from 180deg, red " + porcentaje + "%, #111 " + porcentaje + "%)";
    } else {
        mensajePeligro.style.display = "none"; 
        pantallaVelocidad.style.color = "#66fcf1";
        pantallaVelocidad.style.textShadow = "0 0 10px #66fcf1";
        velocimetroDiv.style.boxShadow = "0 0 15px #66fcf155";
        velocimetroDiv.style.background = "conic-gradient(from 180deg, #66fcf1 " + porcentaje + "%, #111 " + porcentaje + "%)";
    }

    if (estado.intermitente_izq == true) {
        interIzq.classList.add('parpadeando');
    } else {
        interIzq.classList.remove('parpadeando');
    }

    if (estado.intermitente_der == true) {
        interDer.classList.add('parpadeando');
    } else {
        interDer.classList.remove('parpadeando');
    }

    if (estado.velocidad > 0) {
        var duracion = Math.max(1.5, 7 - (estado.velocidad / 40));
        cocheRetro.style.transform = ""; 
        cocheRetro.style.animation = "conduccion " + duracion + "s infinite linear";
        cocheRetro.style.bottom = (Math.random() * 5) + "px"; 
    } else {
        cocheRetro.style.animation = "none";
        cocheRetro.style.transform = "translateX(-50%)";
        cocheRetro.style.bottom = "0px";
    }
}

function hacerSonarClaxon() {
    var audioClaxon = document.getElementById('audio-claxon');
    fetch('/estado')
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(estado_actual) {
        if (estado_actual.encendido == true) { 
            audioClaxon.currentTime = 0; 
            audioClaxon.play();
        } else {
            alert("¡El coche está apagado, no puedes pitar!");
        }
    });
}

document.getElementById('btn-arrancar').onclick = arrancarCoche;
document.getElementById('btn-apagar').onclick = apagarCoche;
document.getElementById('btn-acelerar').onclick = acelerarCoche;
document.getElementById('btn-frenar').onclick = frenarCoche;
document.getElementById('btn-girar-izq').onclick = girarIzquierda;
document.getElementById('btn-girar-der').onclick = girarDerecha;
document.getElementById('btn-pitar').onclick = hacerSonarClaxon;

window.onload = function() {
    fetch('/estado')
    .then(function(respuesta) { return respuesta.json(); })
    .then(function(estado) { actualizarPantalla(estado); });
};
</script>
</body>
</html>
